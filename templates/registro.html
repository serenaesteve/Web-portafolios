<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Registro — Portify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="site-header">
  <div class="wrapper nav">
    <a href="/" class="logo">Portify</a>
    <div class="nav-actions"><a href="/login" class="btn btn-ghost">Entrar</a></div>
  </div>
</header>
<main class="auth-main">
  <div class="auth-card">
    <span class="section-tag">Gratis</span>
    <h1>Crea tu cuenta</h1>
    <p>¿Ya tienes cuenta? <a href="/login">Entra aquí</a></p>
    {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Nombre</label>
      <input type="text" name="nombre" placeholder="Tu nombre" required>
      <label>Email</label>
      <input type="email" name="email" placeholder="tu@email.com" required>
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
      <button type="submit" class="btn btn-primary full-btn btn-large" style="margin-top:20px">Crear cuenta gratis</button>
    </form>
  </div>
</main>
</body>
</html>
