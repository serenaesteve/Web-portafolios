<!-- LOGIN -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Entrar — Portify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="site-header">
  <div class="wrapper nav">
    <a href="/" class="logo">Portify</a>
    <div class="nav-actions"><a href="/registro" class="btn btn-secondary">Registrarse</a></div>
  </div>
</header>
<main class="auth-main">
  <div class="auth-card">
    <span class="section-tag">Bienvenido</span>
    <h1>Entra a Portify</h1>
    <p>¿No tienes cuenta? <a href="/registro">Regístrate gratis</a></p>
    {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" placeholder="tu@email.com" required>
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit" class="btn btn-primary full-btn btn-large" style="margin-top:20px">Entrar</button>
    </form>
  </div>
</main>
</body>
</html>
